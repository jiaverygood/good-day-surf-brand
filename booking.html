<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Day Surf Bali — 레슨 예약 결제</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-gate">
    <div class="auth-card">
      <img class="brand-badge auth-badge" src="logo1.png" alt="Good Day Surf logo">
      <p class="brand-name">Good Day Surf Bali</p>
      <p class="auth-desc">서핑 레슨 예약 결제</p>

      <div class="booking-price-box">
        <p class="booking-price-label">레슨 요금 (1회)</p>
        <p class="booking-price-idr">Rp 300,000</p>
        <p class="booking-price-krw" id="price-krw">환율 조회 중...</p>
      </div>

      <input id="customer-name" class="booking-input" type="text" placeholder="이름" autocomplete="name">
      <input id="customer-phone" class="booking-input" type="tel" placeholder="연락처" autocomplete="tel">

      <button id="pay-btn" class="auth-btn auth-btn-pay" type="button" disabled>결제하기</button>
      <p id="booking-error" class="auth-error" hidden></p>
    </div>
  </div>

  <script src="https://js.tosspayments.com/v1/payment"></script>
  <script src="booking.js"></script>
</body>
</html>
